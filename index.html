<!doctype html><html lang="zh"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>沪教版八上 单词卡片 · 智能练习</title>
<style>
:root{--bg:#f5f6fa;--card:#fff;--line:#e6e8ef;--blue:#2f5496;--brown:#b3541e;--ink:#232733;--mut:#7a8194;
 --ok:#1a9e57;--bad:#d21b1b;--r:14px;--sh:0 1px 3px rgba(20,30,60,.07),0 6px 18px rgba(20,30,60,.05)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,"PingFang SC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
header{background:linear-gradient(120deg,#2f5496,#3f6fc0);color:#fff;padding:14px 18px}
header h1{margin:0;font-size:17px} header p{margin:4px 0 0;font-size:12.5px;opacity:.9}
.bar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);box-shadow:var(--sh)}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 10px}
.tab{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 13px;cursor:pointer;font-size:13px;white-space:nowrap}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.ctrls{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;padding:8px 12px;border-top:1px solid var(--line);font-size:13px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:0;background:#fff;padding:6px 12px;cursor:pointer;font-size:13px;color:var(--mut)}
.seg button.on{background:var(--blue);color:#fff}
.chk{display:inline-flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:3px 8px;border:1px solid var(--line);border-radius:8px}
.chk input{margin:0} .chk.off{opacity:.45}
.grp-label{color:var(--mut);margin-right:2px}
select,.mini{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:13px;background:#fff;cursor:pointer}
.search{padding:8px 12px} .search input{width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px}
main{padding:12px 12px 60px;max-width:1100px;margin:0 auto}
.unit-head{font-size:15px;color:var(--blue);font-weight:700;margin:16px 4px 6px}
.unit-head small{color:var(--mut);font-weight:400}
.row{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin:8px 0;box-shadow:var(--sh)}
.row.phrase{background:#fffaf5}
.badge{font-size:11px;background:#eef;color:var(--blue);border-radius:6px;padding:1px 6px}
.row.phrase .badge,.card.phrase .badge{background:#fde8d8;color:var(--brown)}
.w b{font-size:17px} .pos{color:var(--mut);font-style:italic;margin:0 5px} .gloss{color:#333}
.star{color:#e0a100} .sen-en{margin:7px 0 2px;font-size:15px} .sen-cn{color:#555;font-size:14px}
.foot{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-top:9px}
.pbtn{border:1px solid var(--blue);color:var(--blue);background:#fff;border-radius:8px;padding:5px 9px;font-size:12.5px;cursor:pointer}
.pbtn.alt{border-color:var(--brown);color:var(--brown)}
.pbtn:hover{background:var(--blue);color:#fff}.pbtn.alt:hover{background:var(--brown);color:#fff}
.spacer{flex:1}
.cnt{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);border-radius:9px;padding:3px 5px;background:#fbfbfd}
.cnt .lab{font-size:12px;color:var(--mut)} .cnt .n{min-width:20px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums}
.cnt button{border:1px solid var(--line);background:#fff;width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:15px;line-height:1}
.cnt.l1 .n{color:#d98a00}.cnt.l2 .n{color:#e2600f}.cnt.l3 .n{color:#d21b1b}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;display:flex;flex-direction:column}
.card.phrase{background:#fffaf5}
.flipzone{position:relative;cursor:pointer;padding:20px 16px;min-height:150px;display:flex;flex-direction:column;justify-content:center}
.flipzone:hover{background:rgba(47,84,150,.03)}
.face{transition:opacity .18s} .back{display:none}
.card.flipped .front{display:none} .card.flipped .back{display:block}
.side-tag{position:absolute;top:8px;right:10px;font-size:10.5px;color:var(--mut);letter-spacing:.5px}
.cardword{font-size:26px;font-weight:800} .cardpos{color:var(--mut);font-style:italic;font-size:14px;margin-left:6px}
.cardsen{margin-top:12px;font-size:15px;line-height:1.5}
.cardsen.en{color:#333} .cardgloss{font-size:22px;font-weight:700;color:var(--blue)}
.card.phrase .cardword{font-size:22px} .card.phrase .cardgloss{color:var(--brown)}
.cardsen.cn{color:#444}
.hint{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:11px;color:#b9bfce}
.cardfoot{border-top:1px dashed var(--line);padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.hidden-field{color:#c2c7d4;font-size:13px}
.empty{color:var(--mut);text-align:center;padding:40px}
.reset{margin-left:auto}
audio{display:none}
/* ---------- QUIZ / PRACTICE ---------- */
.hub-banner{background:linear-gradient(120deg,#eaf1ff,#f3f7ff);border:1px solid #d5e2ff;border-radius:var(--r);padding:14px 16px;margin:6px 0 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.hub-banner b{font-size:15px}
.big{background:var(--blue);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-size:14px;cursor:pointer;font-weight:600}
.big.alt{background:var(--brown)} .big.ghost{background:#fff;color:var(--blue);border:1px solid var(--blue)}
.dash{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:10px 0 18px}
.ucard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:var(--sh)}
.ucard .ut{font-size:12.5px;color:var(--blue);font-weight:700}
.ucard .um{font-size:11px;color:var(--mut);margin:2px 0 6px}
.pbar{height:8px;background:#eef0f6;border-radius:6px;overflow:hidden}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,#e2600f,#f0a020,#1a9e57)}
.pct{font-size:12px;font-weight:700;float:right}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:14px}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.opt{border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 13px;text-align:left;font-size:15px;cursor:pointer}
.opt:hover{border-color:var(--blue)}
.opt.correct{background:#e7f7ee;border-color:var(--ok);color:#0f7a41}
.opt.wrong{background:#fdeaea;border-color:var(--bad);color:#a21414}
.opt.dim{opacity:.55}
.qtag{display:inline-block;font-size:11px;background:#eef;color:var(--blue);border-radius:6px;padding:2px 8px;margin-bottom:8px}
.qtag.exam{background:#fde8d8;color:var(--brown)}
.lvchip{font-size:11px;color:#5a6377;background:#eef1f7;border:1px solid var(--line);border-radius:6px;padding:2px 7px;white-space:nowrap}
.lvstars{color:#e0a100;letter-spacing:0}
.lvlegend{display:flex;flex-wrap:wrap;gap:6px 10px;align-items:center;font-size:12px;color:var(--mut);margin:2px 0 10px}
.lvitem{border:1px solid var(--line);border-radius:16px;padding:2px 10px;background:#fff}
.lvitem b{color:#fff;border-radius:4px;padding:0 5px;margin-right:3px;font-size:11px}
.lvitem.lvl1 b{background:#1a9e57}.lvitem.lvl2 b{background:#7a9a1e}.lvitem.lvl3 b{background:#d59700}
.lvitem.lvl4 b{background:#e2600f}.lvitem.lvl5 b{background:#cf1d2a}
.ctrlrow{display:flex;gap:10px 14px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.qstem{font-size:18px;line-height:1.55} .qstem .blank{color:var(--blue);font-weight:700}
.passage{background:#f8f9fc;border:1px solid var(--line);border-radius:10px;padding:12px 14px;line-height:1.7;font-size:15px;margin-bottom:12px}
.passage .bk{background:#fff3d6;border-bottom:2px solid #e0a100;padding:0 8px;border-radius:4px;font-weight:700}
.qin{width:100%;padding:11px 12px;border:2px solid var(--line);border-radius:10px;font-size:17px;margin-top:12px}
.fb{margin-top:12px;padding:10px 12px;border-radius:10px;font-size:14px;display:none}
.fb.show{display:block} .fb.ok{background:#e7f7ee;color:#0f7a41} .fb.no{background:#fdeaea;color:#a21414}
.qbarrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog{flex:1;height:8px;background:#eef0f6;border-radius:6px;overflow:hidden}.prog>i{display:block;height:100%;background:var(--blue)}
.score{font-size:52px;font-weight:800;text-align:center;color:var(--blue)}
.weaklist{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.weakpill{background:#fdeaea;color:#a21414;border-radius:20px;padding:4px 12px;font-size:13px}
.rowbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
@media (max-width:520px){.cardword{font-size:23px}.grid{grid-template-columns:1fr}.qstem{font-size:16px}}
</style></head><body>
<header>

var DATA = {"items": [{"u": 1, "typ": "word", "no": "W01", "word": "dinosaur", "pos": "n.", "gloss": "恐龙", "sent": "Many people wonder why the dinosaurs died out so long ago.", "sent_cn": "很多人想知道恐龙为什么在很久以前就灭绝了。", "star": false, "base": "U1_W01_dinosaur"}, {"u": 1, "typ": "word", "no": "W02", "word": "intelligent", "pos": "adj.", "gloss": "有才智的；聪明的", "sent": "Leonardo da Vinci was an intelligent man who was good at both art and science.", "sent_cn": "列奥纳多·达·芬奇是个聪明的人，他在艺术和科学两方面都很擅长。", "star": false, "base": "U1_W02_intelligent"}, {"u": 1, "typ": "word", "no": "W03", "word": "talented", "pos": "adj.", "gloss": "有才能的；天才的", "sent": "She is a talented painter, and her works are shown in many museums.", "sent_cn": "她是位很有才华的画家，她的作品在许多博物馆里展出。", "star": false, "base": "U1_W03_talented"}, {"u": 1, "typ": "word", "no": "W04", "word": "artistic", "pos": "adj.", "gloss": "有艺术天赋的；（尤指）有美术才能的", "sent": "My cousin is very artistic, so she often draws pictures for our school magazine.", "sent_cn": "我表姐很有艺术天赋，所以她常常为我们的校刊画画。", "star": false, "base": "U1_W04_artistic"}, {"u": 1, "typ": "word", "no": "W05", "word": "perhaps", "pos": "adv.", "gloss": "可能；大概；也许", "sent": "Perhaps we can visit the art museum together this weekend.", "sent_cn": "也许这个周末我们可以一起去参观艺术博物馆。", "star": false, "base": "U1_W05_perhaps"}, {"u": 1, "typ": "word", "no": "W06", "word": "notebook", "pos": "n.", "gloss": "笔记本", "sent": "He writes down every new idea in his little notebook.", "sent_cn": "他把每一个新想法都记在他的小笔记本里。", "star": false, "base": "U1_W06_notebook"}, {"u": 1, "typ": "word", "no": "W07", "word": "vehicle", "pos": "n.", "gloss": "交通工具；车辆", "sent": "A bicycle is a simple vehicle that many students ride to school.", "sent_cn": "自行车是一种简单的交通工具，许多学生骑它上学。", "star": false, "base": "U1_W07_vehicle"}, {"u": 1, "typ": "word", "no": "W08", "word": "prehistoric", "pos": "adj.", "gloss": "史前的", "sent": "Scientists study prehistoric animals to learn about life long ago.", "sent_cn": "科学家研究史前动物，以了解很久以前的生命。", "star": false, "base": "U1_W08_prehistoric"}, {"u": 1, "typ": "word", "no": "W09", "word": "completely", "pos": "adv.", "gloss": "完全地；彻底地", "sent": "After the long trip, I was completely tired and fell asleep at once.", "sent_cn": "长途旅行之后，我完全累坏了，立刻就睡着了。", "star": false, "base": "U1_W09_completely"}, {"u": 1, "typ": "word", "no": "W10", "word": "original", "pos": "adj.", "gloss": "原来的；起初的", "sent": "This is not a copy; it is the original painting by Monet.", "sent_cn": "这不是复制品，而是莫奈的原作。", "star": false, "base": "U1_W10_original"}, {"u": 1, "typ": "word", "no": "W11", "word": "birth", "pos": "n.", "gloss": "出生", "sent": "The birth of a baby brings great joy to the whole family.", "sent_cn": "婴儿的出生给全家人带来了极大的欢乐。", "star": false, "base": "U1_W11_birth"}, {"u": 1, "typ": "word", "no": "W12", "word": "suffering", "pos": "n.", "gloss": "苦难；疼痛", "sent": "The book tells us about the suffering of people during the war.", "sent_cn": "这本书讲述了战争期间人们的苦难。", "star": false, "base": "U1_W12_suffering"}, {"u": 1, "typ": "word", "no": "W13", "word": "artist", "pos": "n.", "gloss": "艺术家；（尤指）画家", "sent": "Picasso was a famous artist whose paintings are known all over the world.", "sent_cn": "毕加索是一位著名的艺术家，他的画作举世闻名。", "star": false, "base": "U1_W13_artist"}, {"u": 1, "typ": "word", "no": "W14", "word": "death", "pos": "n.", "gloss": "死；死亡", "sent": "The death of the great writer made many readers very sad.", "sent_cn": "这位伟大作家的去世让许多读者非常伤心。", "star": false, "base": "U1_W14_death"}, {"u": 1, "typ": "word", "no": "W15", "word": "whole", "pos": "adj.", "gloss": "全部的；所有的", "sent": "She spent the whole afternoon drawing in the park.", "sent_cn": "她在公园里画了一整个下午的画。", "star": false, "base": "U1_W15_whole"}, {"u": 1, "typ": "word", "no": "W16", "word": "piece", "pos": "n.", "gloss": "一首，一篇（作品）", "sent": "He played a beautiful piece of music on the piano.", "sent_cn": "他用钢琴弹奏了一首优美的乐曲。", "star": false, "base": "U1_W16_piece"}, {"u": 1, "typ": "word", "no": "W17", "word": "editor", "pos": "n.", "gloss": "（书籍的）编辑", "sent":  var re=new RegExp('(^|[^A-Za-z])('+escw+'(?:s|es|ed|ing|d)?)([^A-Za-z]|$)','i');
 var m=s.match(re),surface,text;
 if(m){surface=m[2];text=s.replace(m[2],'<span class="blank">______</span>');}
 else{surface=w;text=s+' <span class="blank">(______: '+esc(w)+')</span>';}
 var hint=surface.charAt(0)+'…';
 var acc=[surface.toLowerCase()];if(acc.indexOf(w.toLowerCase())<0)acc.push(w.toLowerCase());
 return {text:text,surface:surface,hint:hint,accept:acc};}

function examLvl(cat,fallback){var m={'单项选择':3,'词形变化':4,'完形填空':5,'阅读理解':5};return m[cat]||fallback||3;}
// normalize a bank item into an array of cards
function bankCards(b){
 var cards=[];var bs=basesFor(b.unit,b.words);var examtag=true;var L=b.lvl||examLvl(b.cat);
 if(b.kind==='mcq'){cards.push({kind:'mcq',lvl:L,tag:b.cat,exam:examtag,stem:b.stem,opts:b.options,ans:b.answer,words:bs,explain:b.explain||''});}
 else if(b.kind==='fill'){cards.push({kind:'fill',lvl:L,tag:b.cat,exam:examtag,stem:'用所给词的适当形式填空：<div class="passage" style="margin-top:10px">'+b.stem.replace(/___+/,'<span class="blank">______</span>')+'</div>',accept:b.accept.map(function(x){return x.toLowerCase();}),words:bs,explain:b.explain||''});}
 else if(b.kind==='passage'){var pw=b.blanks.length;
   b.blanks.forEach(function(bl,i){
     var ptxt=b.passage.replace(/\[(\d+)\]/g,function(_,k){k=+k;return k===i+1?'<span class="bk">('+k+')</span>':'<span class="bk" style="background:#eef;border-color:#ccd">('+k+') '+((mstore.__tmp&&mstore.__tmp[b.id]&&mstore.__tmp[b.id][k])||'____')+'</span>';});
     cards.push({kind:'mcq',lvl:5,tag:b.cat,exam:examtag,passage:'<b>完形填空</b>　'+ptxt,stem:'第 <b>'+(i+1)+'</b> 空：',opts:bl.options,ans:bl.answer,words:basesFor(b.unit,bl.words||b.words),explain:i===pw-1?(b.explain||''):''});});}
 else if(b.kind==='reading'){b.questions.forEach(function(q){
     cards.push({kind:'mcq',lvl:5,tag:b.cat,exam:examtag,passage:'<b>阅读理解</b><br>'+b.passage,stem:q.stem,opts:q.options,ans:q.answer,words:bs,explain:q.explain||b.explain||''});});}
 return cards;}

// relations bank (handpicked, graded): syn / analogy / classify
function relInScope(unit,t){if(!window.RELATIONS||!RELATIONS.items)return [];
 return RELATIONS.items.filter(function(r){return r.type===t && (unit==='all'||!r.unit||r.unit===0||r.unit==+unit);});}
function relCard(r){var bases=(r.words||[]).map(wordBaseAny).filter(Boolean);
 var lab={syn:(r.ask||'同义/反义'),analogy:'类比推理',classify:'分类·找不同'}[r.type]||'关系';
 return {kind:'mcq',lvl:r.lvl||3,tag:lab,rel:true,stem:r.stem,opts:r.options,ans:r.answer,words:bases,explain:r.explain||''};}

var quiz=null;
function pickAutoCard(it,L,types){
 var cands=['meaning','word','cloze','spell','dict'].filter(function(t){return types.indexOf(t)>=0&&canType(it,t);});
 if(!cands.length)return null;
 cands.sort(function(a,b){return Math.abs(AUTO_LVL[a]-L)-Math.abs(AUTO_LVL[b]-L);});
 return autoCard(it,cands[0]);}
function pickAutoExact(it,L,types){
 var cands=['meaning','word','cloze','spell','dict'].filter(function(t){return types.indexOf(t)>=0&&canType(it,t)&&AUTO_LVL[t]===L;});
 if(!cands.length)return null;shuffle(cands);return autoCard(it,cands[0]);}
function poolCards(unit,types){var pool=[];
 if(types.indexOf('exam')>=0){bankInScope(unit).forEach(function(b){pool=pool.concat(bankCards(b));});}
 ['syn','analogy','classify'].forEach(function(t){if(types.indexOf(t)>=0){relInScope(unit,t).forEach(function(r){pool.push(relCard(r));});}});
 return pool;}
function buildSession(kind){
 var unit=st.unit;var items=scope().slice();
 var types=quizTypes();var count=quizCount();var lvlMode=quizLevel();
 var ordered=items.slice().sort(function(a,b){return prio(b)-prio(a);});
 if(kind==='random')shuffle(ordered);
 var weakSet={};ordered.slice(0,50).forEach(function(it){weakSet[it.base]=1;});
 var pool=poolCards(unit,types);
 var autoOn=['meaning','word','cloze','spell','dict'].some(function(t){return types.indexOf(t)>=0;});
 var cards=[];
 if(lvlMode==='auto'){
   if(autoOn)ordered.forEach(function(it){if(cards.length>=count*2)return;var c=pickAutoCard(it,targetLevel(it),types);if(c)cards.push(c);});
   var pw=pool.filter(function(c){return (c.words||[]).some(function(b){return weakSet[b];});});
   shuffle(pw);cards=cards.concat(pw.slice(0,Math.ceil(count*0.5)));
   if(cards.length<count){shuffle(pool);cards=cards.concat(pool.slice(0,count));}
 }else{
   var L=+lvlMode;
   if(autoOn)ordered.forEach(function(it){if(cards.length>=count*3)return;var c=pickAutoExact(it,L,types);if(c)cards.push(c);});
   var pl=pool.filter(function(c){return (c.lvl||3)===L;});shuffle(pl);cards=cards.concat(pl);
 }
 shuffle(cards);
 cards=cards.slice(0,kind==='diag'?8:count);
 if(!cards.length){alert('这个范围/难度下暂时没有可出的题。\n可尝试：把难度设为「自动」、多勾几个题型，或切换到「全部」单元。');return;}
 quiz={cards:cards,idx:0,right:0,wrong:[],answered:false,scopeLabel:(unit==='all'?'全部单元':'Unit '+unit)+(lvlMode==='auto'?' · 自动进阶':' · L'+lvlMode+' '+(LEVELS[+lvlMode]||''))};
 if(kind==='diag'){localStorage.setItem(DK,todayStr());}
 renderQuiz();
}
var ALLTYPES=['meaning','word','syn','analogy','classify','cloze','spell','dict','exam'];
function quizTypes(){var t=[],found=false;ALLTYPES.forEach(function(k){var el=document.getElementById('qt_'+k);if(el){found=true;if(el.checked)t.push(k);}});
 if(found){st.qtypes=t;return t;} return (st.qtypes&&st.qtypes.length)?st.qtypes:ALLTYPES.slice();}
function quizCount(){var el=document.getElementById('qCount');if(el){st.qcount=+el.value;return st.qcount;}return st.qcount||12;}
function quizLevel(){var el=document.getElementById('qLevel');if(el){st.qlevel=el.value;return st.qlevel;}return st.qlevel||'auto';}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function renderQuiz(){
 var m=document.getElementById('main');
 if(quiz.idx>=quiz.cards.length){return renderSummary();}
 var c=quiz.cards[quiz.idx];quiz.answered=false;
 var h='<div class="panel">';
 var L=c.lvl||1;
 h+='<div class="qbarrow"><span class="qtag'+(c.exam?' exam':'')+'">'+esc(c.tag)+(c.exam?' · 中考题':'')+'</span>'+
    '<span class="lvchip" title="难度 L'+L+' · '+(LEVELS[L]||'')+'">L'+L+' <span class="lvstars">'+starsFor(L)+'</span></span>'+
    '<div class="prog"><i style="width:'+Math.round(quiz.idx/quiz.cards.length*100)+'%"></i></div><span style="font-size:12px;color:var(--mut)">第 '+(quiz.idx+1)+'/'+quiz.cards.length+'</span></div>';
 if(c.passage)h+='<div class="passage">'+c.passage+'</div>';
 h+='<div class="qstem">'+c.stem+'</div>';
 if(c.audio)h+='<div style="margin-top:10px"><button class="pbtn" onclick="play(\''+c.audio+'\')">🔊 播放</button></div>';
 if(c.kind==='mcq'){h+='<div class="opts" id="opts">';c.opts.forEach(function(o,i){h+='<button class="opt" id="opt_'+i+'" onclick="answerMCQ('+i+')">'+esc(o)+'</button>';});h+='</div>';}
 else{h+='<input class="qin" id="qin" placeholder="输入答案后回车；不会就直接提交看答案" autocomplete="off" autocapitalize="off" onkeydown="if(event.key===\'Enter\')answerFill()"><button class="big" style="margin-top:10px" onclick="answerFill()">提交 / 不会</button>';}
 h+='<div class="fb" id="fb"></div>';
 h+='<div class="rowbtns"><button class="big ghost" id="nextBtn" style="display:none" onclick="nextQ()">下一题 ▸</button><button class="mini" onclick="quitQuiz()">退出</button></div>';
 h+='</div>';
 m.innerHTML=h;
 if(c.autoplay&&c.audio)play(c.audio);
 var inp=document.getElementById('qin');if(inp)inp.focus();
}
function markWords(c,ok){(c.words||[]).forEach(function(b){grade(b,ok);if(!ok)setErr(b,ec(b)+1);});}
function answerMCQ(i){if(quiz.answered)return;quiz.answered=true;var c=quiz.cards[quiz.idx];var ok=(i===c.ans);
 for(var k=0;k<c.opts.length;k++){var el=document.getElementById('opt_'+k);el.classList.add('dim');el.onclick=null;if(k===c.ans)el.classList.add('correct');}
 document.getElementById('opt_'+i).classList.remove('dim');if(!ok)document.getElementById('opt_'+i).classList.add('wrong');
 finishCard(c,ok);}
function answerFill(){if(quiz.answered)return;var c=quiz.cards[quiz.idx];var v=(document.getElementById('qin').value||'').trim().toLowerCase();
 quiz.answered=true;var blank=(v==='');var ok=!blank&&c.accept.indexOf(v)>=0;document.getElementById('qin').disabled=true;finishCard(c,ok,blank);}
function finishCard(c,ok,blank){markWords(c,ok);if(ok)quiz.right++;else quiz.wrong.push(c);
 var fb=document.getElementById('fb');fb.className='fb show '+(ok?'ok':'no');
 fb.innerHTML=(ok?'✅ 正确！':(blank?'⭕ 未作答（跳过）。':'❌ 不对。'))+(c.explain?'　'+c.explain:'');
 document.getElementById('nextBtn').style.display='';document.getElementById('nextBtn').focus();}
function nextQ(){quiz.idx++;renderQuiz();}
function quitQuiz(){quiz=null;renderHub();}
function renderSummary(){var m=document.getElementById('main');var total=quiz.cards.length;var pct=Math.round(quiz.right/total*100);
 var weakBases={};quiz.wrong.forEach(function(c){(c.words||[]).forEach(function(b){weakBases[b]=1;});});
 var byBase={};ITEMS.forEach(function(it){byBase[it.base]=it;});
 var pills=Object.keys(weakBases).map(function(b){var it=byBase[b];if(!it)return '';return '<span class="weakpill" onclick="play(\''+dir(it,'UK')+b+'.mp3\')" style="cursor:pointer">'+esc(it.word)+' 🔊</span>';}).join('');
 var h='<div class="panel" style="text-align:center">'+
   '<div class="score">'+quiz.right+' / '+total+'</div>'+
   '<div style="color:var(--mut);margin-bottom:6px">正确率 '+pct+'%　·　'+esc(quiz.scopeLabel)+'</div>'+
   (pills?'<div style="text-align:left;margin-top:12px"><b>需要加强的词（已计入错题，会更早再次出现）：</b><div class="weaklist">'+pills+'</div></div>':'<div style="color:var(--ok);margin-top:10px">🎉 全部答对，太棒了！</div>')+
   '<div class="rowbtns" style="justify-content:center"><button class="big" onclick="buildSession(\'weak\')">再来一组（薄弱强化）</button><button class="big ghost" onclick="renderHub()">返回</button></div>'+
   '</div>';
 m.innerHTML=h;quiz=null;renderDashInto();}
function renderDashInto(){} // placeholder (summary already replaces main)

function overallStat(){var seen=0,sum=0;ITEMS.forEach(function(it){var m=mget(it.base);if(m.seen)seen++;sum+=itemMastery(it);});return {seen:seen,total:ITEMS.length,pct:Math.round(sum/ITEMS.length*100)};}
function dueCount(){var now=Date.now(),n=0;ITEMS.forEach(function(it){var m=mget(it.base);if(m.seen&&m.due&&m.due<=now)n++;});return n;}
function renderHub(){
 var m=document.getElementById('main');var ov=overallStat();var due=dueCount();var need=todayStr()!==localStorage.getItem(DK);
 var h='';
 h+='<div class="hub-banner">';
 if(need||due>0){h+='<div><b>🩺 今日小测</b><div style="font-size:12.5px;color:var(--mut)">做 8 道题，帮你判断今天哪些词没掌握'+(due>0?('（有 '+due+' 个词到复习时间）'):'')+'</div></div><button class="big" onclick="startDiag()">开始今日小测</button>';}
 else{h+='<div><b>✅ 今日小测已完成</b><div style="font-size:12.5px;color:var(--mut)">可继续做薄弱强化或随机测验</div></div>';}
 h+='</div>';
 h+='<div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:4px 0 8px">'+
    '<div><span style="font-size:30px;font-weight:800;color:var(--blue)">'+ov.pct+'%</span> <span style="color:var(--mut)">总体掌握度</span></div>'+
    '<div style="color:var(--mut)">已练 '+ov.seen+' / '+ov.total+' 词　·　到期复习 '+due+'</div></div>';
 // dashboard per unit
 h+='<div class="dash">';
 for(var u=1;u<=8;u++){var items=ITEMS.filter(function(x){return x.u===u;});var seen=0,sum=0;items.forEach(function(it){var mm=mget(it.base);if(mm.seen)seen++;sum+=itemMastery(it);});var p=Math.round(sum/items.length*100);
   h+='<div class="ucard"><div class="ut">Unit '+u+' <span class="pct" style="color:'+(p>=70?'#1a9e57':p>=40?'#e2600f':'#d21b1b')+'">'+p+'%</span></div><div class="um">'+esc(THEMES[u].split(' ')[0])+' · 已练 '+seen+'/'+items.length+'</div><div class="pbar"><i style="width:'+p+'%"></i></div></div>';}
 h+='</div>';
 // level legend (L1->L5 ramp)
 h+='<div class="lvlegend">难度阶梯：';
 for(var L=1;L<=5;L++)h+='<span class="lvitem lvl'+L+'"><b>L'+L+'</b> '+esc(LEVELS[L])+'</span>';
 h+='</div>';
 // controls
 h+='<div class="panel">';
 h+='<div class="ctrlrow"><span class="grp-label">题型</span>'+
    typeChk('meaning','词义选择 ·L1',1)+typeChk('word','选词 ·L2',1)+
    typeChk('syn','同义/反义 ·L2',1)+typeChk('analogy','类比 ·L3',1)+typeChk('classify','分类·找不同 ·L3',1)+
    typeChk('cloze','例句填空 ·L3',1)+typeChk('spell','听音拼写 ·L3',1)+typeChk('dict','强制听写 ·L4',1)+
    typeChk('exam','中考题 ·L3-5',1)+'</div>';
 h+='<div class="ctrlrow"><span class="grp-label">难度</span>'+
    '<select id="qLevel"><option value="auto"'+(!st.qlevel||st.qlevel==='auto'?' selected':'')+'>自动（按掌握度进阶）</option>'+
    [1,2,3,4,5].map(function(L){return '<option value="'+L+'"'+(st.qlevel==(''+L)?' selected':'')+'>L'+L+' · '+LEVELS[L]+'</option>';}).join('')+'</select>'+
    '<span class="grp-label">题量</span><select id="qCount"><option>8</option><option selected>12</option><option>20</option></select></div>';
 h+='<div class="rowbtns"><button class="big" onclick="buildSession(\'weak\')">📝 薄弱强化练习</button><button class="big alt" onclick="buildSession(\'random\')">🎲 随机测验</button></div>';
 h+='<div style="font-size:12px;color:var(--mut);margin-top:8px">难度选「自动」时，每个词从 L1 起，答对后自动升级到更难题型（认得 → 会用 → 会写）；也可手动锁定某一级做专项。范围跟随上方单元（当前：'+(st.unit==='all'?'全部':'Unit '+st.unit)+'）。</div></div>';
 m.innerHTML=h;
}
function typeChk(k,label,on){return '<label class="chk"><input type="checkbox" id="qt_'+k+'" '+(on?'checked':'')+'>'+esc(label)+'</label>';}
function startDiag(){ALLTYPES.forEach(function(k){var el=document.getElementById('qt_'+k);if(el)el.checked=true;});
 var lv=document.getElementById('qLevel');if(lv)lv.value='auto';st.qlevel='auto';buildSession('diag');}

/* ===== router / controls ===== */
function render(){if(st.mode==='quiz'){if(quiz)renderQuiz();else renderHub();}else renderBrowse();}
function setMode(m){st.mode=m;['List','Card','Quiz'].forEach(function(x){document.getElementById('m'+x).classList.toggle('on','m'+x==='m'+(m.charAt(0).toUpperCase()+m.slice(1)));});
 var q=(m==='quiz');document.getElementById('browseCtrls').style.display=q?'none':'contents';document.getElementById('searchBar').style.display=q?'none':'block';
 if(m!=='quiz')quiz=null;render();}
function setSort(v){st.sort=v;render()}
function setQ(v){st.q=v;render()}
function tog(k){var cb=document.getElementById('f'+k);st.show[k]=cb.checked;cb.parentElement.classList.toggle('off',!cb.checked);render()}
function setUnit(u){st.unit=u;[].forEach.call(document.querySelectorAll('.tab'),function(t){t.classList.toggle('on',t.dataset.u===u)});if(st.mode==='quiz')quiz=null;render()}
function resetAll(){if(confirm('确定清空所有卡片的错误计数吗？（不影响练习掌握度）')){err={};saveErr();render()}}
(function(){var t=document.getElementById('tabs');var h='<button class="tab" data-u="all" onclick="setUnit(\'all\')">全部</button>';
 for(var u=1;u<=8;u++)h+='<button class="tab'+(u===1?' on':'')+'" data-u="'+u+'" onclick="setUnit(\''+u+'\')">Unit '+u+'</button>';t.innerHTML=h;})();
render();
</script></body></html>
